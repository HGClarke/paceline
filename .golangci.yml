# .golangci.yml
run:
  timeout: 5m

linters:
  enable:
    - misspell
    - unparam
    - nakedret
    - prealloc
    - exhaustive
    - nolintlint
    - gocritic

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
  nakedret:
    max-func-lines: 30
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
